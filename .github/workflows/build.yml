name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: yt-dlp-gui-macos
            ext: dmg
          - os: ubuntu-latest
            artifact: yt-dlp-gui-linux
            ext: tar.gz
          - os: windows-latest
            artifact: yt-dlp-gui-windows
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgirepository1.0-dev gir1.2-webkit2-4.1 libwebkit2gtk-4.1-dev

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install Python dependencies (macOS/Linux)
        if: runner.os != 'Windows'
        run: pip install pywebview yt-dlp pyinstaller

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install pywebview yt-dlp pyinstaller

      # ── macOS Build ──
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          FFMPEG=$(which ffmpeg)
          FFPROBE=$(which ffprobe)
          pyinstaller \
            --name "yt-dlp-gui" \
            --windowed \
            --noconfirm \
            --clean \
            --add-data "gui/static:static" \
            --add-binary "$FFMPEG:." \
            --add-binary "$FFPROBE:." \
            --hidden-import webview \
            --hidden-import webview.platforms.cocoa \
            --hidden-import yt_dlp \
            --exclude-module tkinter \
            gui/app.py

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg_staging
          if [ -d "dist/yt-dlp-gui.app" ]; then
            cp -R "dist/yt-dlp-gui.app" dmg_staging/
          else
            cp -R dist/yt-dlp-gui dmg_staging/
          fi
          ln -sf /Applications dmg_staging/Applications
          hdiutil create -volname "yt-dlp GUI" -srcfolder dmg_staging -ov -format UDZO "dist/${{ matrix.artifact }}.${{ matrix.ext }}"

      # ── Linux Build ──
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          FFMPEG=$(which ffmpeg)
          FFPROBE=$(which ffprobe)
          pyinstaller \
            --name "yt-dlp-gui" \
            --onedir \
            --noconfirm \
            --clean \
            --add-data "gui/static:static" \
            --add-binary "$FFMPEG:." \
            --add-binary "$FFPROBE:." \
            --hidden-import webview \
            --hidden-import yt_dlp \
            --exclude-module tkinter \
            gui/app.py

      - name: Package tar.gz (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar -czf "${{ matrix.artifact }}.${{ matrix.ext }}" yt-dlp-gui/

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command ffmpeg).Source -Destination .\ffmpeg.exe
          Copy-Item (Get-Command ffprobe).Source -Destination .\ffprobe.exe
          pyinstaller --name "yt-dlp-gui" --windowed --onedir --noconfirm --clean `
            --add-data "gui\static;static" `
            --add-binary "ffmpeg.exe;." `
            --add-binary "ffprobe.exe;." `
            --hidden-import webview `
            --hidden-import webview.platforms.mshtml `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import yt_dlp `
            --exclude-module tkinter `
            gui\app.py

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist\yt-dlp-gui" -DestinationPath "dist\${{ matrix.artifact }}.${{ matrix.ext }}"

      # ── Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
